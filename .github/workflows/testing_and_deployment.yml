name: Unit Tests, Build & Deploy Library

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'

jobs:
  build:
    if: contains(github.event.head_commit.message, '[AUTO]') == false
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12.9"]

    steps:
      - uses: actions/checkout@v5.0.1

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Set Project Root Environment Variable
        run: echo "PROJECT_ROOT=$(pwd)" >> $GITHUB_ENV

      - name: Create required directories and list contents
        run: |
          mkdir -p config logs
          echo "Directory contents:"
          ls -l

      - name: Run unit tests with coverage
        run: python -m pytest -s -vv --cov=tksessentials --cov-report=term-missing --cov-report=html --cov-fail-under=80

      - name: Run integration tests
        run: python -m pytest -s -vv tests/int

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v6.0.0
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

  pypi-publish:
    needs: build
    name: Upload Release to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5.0.1
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: 3.12.9

      - name: Install build tools and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build bumpver setuptools
          python -m pip install ".[dev]"

      - name: Configure Git
        run: |
          git config --local user.email "brayan@brayan.com"
          git config --local user.name "svabra"

      - name: Bump version
        if: contains(github.event.head_commit.message, '[AUTO]') == false
        run: bumpver update --patch --commit-message "[AUTO] Bump version"

      - name: Build package
        run: python -m build

      - name: Validate package metadata with twine
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
